<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="900" fill="#ffffff"/>
  <text x="450" y="46" text-anchor="middle" font-size="23" font-weight="700" fill="#1f1f1d">Data model — star schema (ERD)</text>
  <text x="450" y="72" text-anchor="middle" font-size="13.5" font-weight="400" fill="#5f5e5a">6 dimension tables &#183; 4 fact tables &#183; all data synthetic</text>

  <!-- dimension -> fact connectors (thin, drawn first so boxes sit on top) -->
  <g stroke="#C8C6BE" stroke-width="0.9" fill="none">
    <line x1="92"  y1="158" x2="160" y2="340"/><line x1="92"  y1="158" x2="450" y2="340"/><line x1="92"  y1="158" x2="740" y2="340"/>
    <line x1="232" y1="158" x2="160" y2="340"/><line x1="232" y1="158" x2="450" y2="340"/><line x1="232" y1="158" x2="740" y2="340"/>
    <line x1="372" y1="158" x2="160" y2="340"/><line x1="372" y1="158" x2="450" y2="340"/>
    <line x1="512" y1="158" x2="450" y2="340"/>
    <line x1="652" y1="158" x2="450" y2="340"/><line x1="652" y1="158" x2="740" y2="340"/>
    <line x1="792" y1="158" x2="740" y2="340"/>
  </g>

  <!-- market <-> Dim_Date only (dashed, routed on the left margin) -->
  <path d="M28 128 L14 128 L14 640 L320 640" fill="none" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="70" y="620" font-size="11.5" font-weight="400" fill="#888780">Market links to Dim_Date only</text>

  <!-- DIMENSIONS (blue) -->
  <g font-size="13.5" font-weight="600" fill="#0C447C">
    <rect x="28"  y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="168" y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="308" y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="448" y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="588" y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="728" y="100" width="128" height="58" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text x="92"  y="126" text-anchor="middle">Dim_Date</text>
    <text x="232" y="126" text-anchor="middle">Dim_Player</text>
    <text x="372" y="126" text-anchor="middle">Dim_Account</text>
    <text x="512" y="126" text-anchor="middle">Dim_AlertType</text>
    <text x="652" y="126" text-anchor="middle">Dim_Status</text>
    <text x="792" y="126" text-anchor="middle">Dim_Analyst</text>
  </g>
  <g font-size="11" font-weight="400" fill="#185FA5">
    <text x="92"  y="145" text-anchor="middle">PK Date_Key</text>
    <text x="232" y="145" text-anchor="middle">PK Player_Key</text>
    <text x="372" y="145" text-anchor="middle">PK Account_Key</text>
    <text x="512" y="145" text-anchor="middle">PK AlertType_Key</text>
    <text x="652" y="145" text-anchor="middle">PK Status_Key</text>
    <text x="792" y="145" text-anchor="middle">PK Analyst_Key</text>
  </g>

  <!-- CORE FACTS (teal) -->
  <g>
    <rect x="40"  y="340" width="240" height="168" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <rect x="330" y="340" width="240" height="168" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
    <rect x="620" y="340" width="240" height="168" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  </g>
  <g font-size="14.5" font-weight="600" fill="#04342C">
    <text x="160" y="368" text-anchor="middle">Fact_Transactions</text>
    <text x="450" y="368" text-anchor="middle">Fact_AML_Alerts</text>
    <text x="740" y="368" text-anchor="middle">Fact_STR_Cases</text>
  </g>
  <g stroke="#9FE1CB" stroke-width="1"><line x1="60" y1="380" x2="260" y2="380"/><line x1="350" y1="380" x2="550" y2="380"/><line x1="640" y1="380" x2="840" y2="380"/></g>
  <g font-size="11.5" font-weight="400" fill="#0F6E56">
    <text x="60" y="402">PK Transaction_Key</text><text x="60" y="424">FK Date &#183; Account &#183; Player</text><text x="60" y="446">Amount &#183; Direction</text><text x="60" y="468">Payment_Format &#183; flags</text>
    <text x="350" y="402">PK Alert_Key</text><text x="350" y="424">FK Transaction &#183; AlertType</text><text x="350" y="446">FK Status &#183; Account &#183; Player</text><text x="350" y="468">Risk_Score &#183; Severity</text>
    <text x="640" y="402">PK Case_Key</text><text x="640" y="424">FK Alert &#183; Analyst &#183; Status</text><text x="640" y="446">FK Open/Close Date</text><text x="640" y="468">SLA_Days &#183; Investigation_Days</text>
  </g>

  <!-- fact lineage arrows (bold) -->
  <line x1="280" y1="424" x2="330" y2="424" stroke="#993C1D" stroke-width="2.2" marker-end="url(#ah)"/>
  <line x1="570" y1="424" x2="620" y2="424" stroke="#993C1D" stroke-width="2.2" marker-end="url(#ah)"/>
  <text x="305" y="414" text-anchor="middle" font-size="11" font-weight="600" fill="#993C1D">escalates</text>
  <text x="595" y="414" text-anchor="middle" font-size="11" font-weight="600" fill="#993C1D">converts</text>

  <!-- MARKET FACT (amber, separate) -->
  <rect x="320" y="600" width="260" height="104" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
  <text x="450" y="628" text-anchor="middle" font-size="14.5" font-weight="600" fill="#633806">Fact_MarketPerformance</text>
  <line x1="340" y1="640" x2="560" y2="640" stroke="#FAC775" stroke-width="1"/>
  <g font-size="11.5" font-weight="400" fill="#854F0B">
    <text x="340" y="662">PK MarketPerf_Key &#183; FK Date_Key</text>
    <text x="340" y="682">Wagers &#183; GGR &#183; Active accts &#183; ARPPA</text>
    <text x="340" y="700">grain: one row / month</text>
  </g>
  <line x1="450" y1="600" x2="450" y2="560" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#ahg)"/>

  <!-- legend -->
  <rect x="40" y="770" width="820" height="70" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="1"/>
  <text x="60" y="798" font-size="12.5" font-weight="600" fill="#444441">How to read this</text>
  <text x="60" y="820" font-size="12" font-weight="400" fill="#5f5e5a">Bold arrows = fact lineage (a transaction can raise alerts; an escalated alert becomes a case).</text>
  <text x="60" y="836" font-size="12" font-weight="400" fill="#5f5e5a">Thin lines = dimension &#8594; fact links (1-to-many). Exact foreign keys: documentation/data_model.md &#167;3.</text>
</svg>
